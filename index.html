
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Hash - Crystal Rotation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0f;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 320px;
            height: 450px;
        }

        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
        }

        .card-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay to mask the original crystal area */
        .crystal-layer {
            position: absolute;
            top: 22%;
            left: 18%;
            width: 64%;
            height: 50%;
            animation: slowRotate 8s linear infinite;
            transform-origin: center center;
        }

        .crystal-layer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            clip-path: ellipse(48% 50% at 50% 50%);
        }

        @keyframes slowRotate {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }

        /* Glow pulse effect */
        .glow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            pointer-events: none;
            animation: glowPulse 4s ease-in-out infinite;
            box-shadow: inset 0 0 60px rgba(128, 0, 255, 0.1);
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: inset 0 0 30px rgba(128, 0, 255, 0.05), 0 0 20px rgba(128, 0, 255, 0.1);
            }
            50% {
                box-shadow: inset 0 0 60px rgba(128, 0, 255, 0.15), 0 0 40px rgba(128, 0, 255, 0.2);
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card-bg">
            <img src="crystal.png" alt="Soul Hash Card">
        </div>
        <div class="crystal-layer">
            <img src="crystal.png" alt="Crystal rotating">
        </div>
        <div class="glow-overlay"></div>
    </div>
</body>
</html>
