<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SoulHash AI</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at center, #020202, #000);
  color:#00ffe1;
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
  overflow:hidden;
}

/* PARTÍCULAS */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* CONTAINER */
.container {
  position:relative;
  z-index:1;
  margin-top:80px;
}

/* ORB */
#orb {
  width:200px;
  height:200px;
  margin:20px auto;
  border-radius:50%;
  background: radial-gradient(circle, #00ffe1, transparent);
  box-shadow: 0 0 60px #00ffe1;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform:scale(1); }
  50% { transform:scale(1.25); }
  100% { transform:scale(1); }
}

/* BOTÃO */
button {
  margin-top:20px;
  padding:12px 30px;
  border:1px solid #00ffe1;
  background:transparent;
  color:#00ffe1;
  cursor:pointer;
}

button:hover {
  background:#00ffe1;
  color:#000;
}

/* CARTA */
.card {
  margin:30px auto;
  width:260px;
  padding:20px;
  border-radius:12px;
  background: rgba(0,255,225,0.05);
  backdrop-filter: blur(8px);
  border:1px solid rgba(0,255,225,0.3);
  transform: scale(0.8);
  opacity:0;
  transition:0.5s;
}

.card.show {
  transform: scale(1);
  opacity:1;
}

/* RARIDADE */
.comum { border-color: #888; }
.raro { border-color: #00ffe1; }
.lendario { border-color: gold; box-shadow:0 0 20px gold; }

/* GLITCH */
.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { transform:translate(0); }
  20% { transform:translate(-2px,2px); }
  40% { transform:translate(2px,-2px); }
  60% { transform:translate(-1px,1px); }
  80% { transform:translate(1px,-1px); }
  100% { transform:translate(0); }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>SOULHASH AI</h1>

  <div id="orb"></div>

  <p id="status">Clique para iniciar análise</p>

  <button onclick="gerar()">INICIAR</button>

  <div id="card" class="card"></div>
</div>

<script src="script.js"></script>

<script>
/* PARTÍCULAS */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2
  });
}

function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#00ffe1";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += 0.5;
    if(p.y > canvas.height) p.y = 0;
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();

/* IA */
function gerar(){
  const status = document.getElementById("status");
  const card = document.getElementById("card");

  card.className = "card";
  card.innerHTML = "";

  const etapas = [
    "Escaneando alma...",
    "Quebrando frequência...",
    "Extraindo núcleo...",
    "Gerando entidade..."
  ];

  let i=0;

  const loop = setInterval(()=>{
    status.innerText = etapas[i];
    i++;

    if(i>=etapas.length){
      clearInterval(loop);

      document.getElementById("orb").classList.add("glitch");

      setTimeout(()=>{
        document.getElementById("orb").classList.remove("glitch");

        const alma = gerarAlma();

        let raridade = "comum";
        if(alma.nivel > 70) raridade = "raro";
        if(alma.nivel > 90) raridade = "lendario";

        card.classList.add(raridade);

        card.innerHTML = `
          <h2>${alma.nome}</h2>
          <p>${alma.tipo}</p>
          <p>Nível: ${alma.nivel}</p>
          <p>Energia: ${alma.energia}</p>
          <p>Raridade: ${raridade.toUpperCase()}</p>
        `;

        card.classList.add("show");
        status.innerText = "Entidade materializada";
      },1000);
    }
  },700);
}
</script>

</body>
</html>
