<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SoulHash AI</title>

<style>
body {
  margin:0;
  background: url('bg.jpg') no-repeat center center;
  background-size: cover;
  color:#ffffff;
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
  overflow:hidden;
}

/* CANVAS */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* CONTAINER */
.container {
  position:relative;
  z-index:1;
  margin-top:80px;
}

/* BOTÃO */
button {
  margin-top:20px;
  padding:12px 30px;
  border:1px solid #b400ff;
  background:transparent;
  color:#b400ff;
  cursor:pointer;
}

button:hover {
  background:#b400ff;
  color:#000;
}

/* CARD */
.card {
  margin:30px auto;
  width:260px;
  padding:20px;
  border-radius:12px;
  background: rgba(0,0,0,0.6);
  border:1px solid rgba(180,0,255,0.5);
  transform: scale(0.8);
  opacity:0;
  transition:0.5s;
}

.card.show {
  transform: scale(1);
  opacity:1;
}

/* RARIDADE */
.comum { border-color: #888; }
.raro { border-color: #b400ff; }
.lendario { border-color: gold; box-shadow:0 0 20px gold; }
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>SOULHASH AI</h1>

  <p id="status">Clique para iniciar análise</p>

  <button onclick="gerar()">INICIAR</button>

  <div id="card" class="card"></div>
</div>

<script src="script.js"></script>

</body>
</html>
