<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SoulHash AI</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI,sans-serif;
  color:white;
  text-align:center;

  background:url("bg.jpg") no-repeat center center;
  background-size:cover;
}

/* canvas */
#particles{
  position:fixed;
  inset:0;
  z-index:0;
}

/* container */
.container{
  position:relative;
  z-index:3;
  margin-top:80px;
}

/* LUZ DA PEDRA */
.crystal-light{
  position:fixed;

  /* ajuste fino da posição da pedra no mobile */
  left:50%;
  top:42%;

  transform:translate(-50%,-50%);

  width:120px;
  height:220px;

  pointer-events:none;
  z-index:1;

  background:
    radial-gradient(
      ellipse at center,
      rgba(180,0,255,.9) 0%,
      rgba(180,0,255,.35) 35%,
      transparent 70%
    );

  filter:blur(18px);

  animation:pulseCrystal 2.2s infinite ease-in-out;
}

@keyframes pulseCrystal{
  0%{
    opacity:.4;
    transform:translate(-50%,-50%) scale(.9);
  }

  50%{
    opacity:1;
    transform:translate(-50%,-50%) scale(1.25);
  }

  100%{
    opacity:.4;
    transform:translate(-50%,-50%) scale(.9);
  }
}

/* botão */
button{
  padding:12px 30px;
  border:1px solid #b400ff;
  background:transparent;
  color:#b400ff;
  cursor:pointer;
}

.card{
  margin:30px auto;
  width:260px;
  padding:20px;

  background:rgba(0,0,0,.5);
  border:1px solid rgba(180,0,255,.4);
  border-radius:12px;

  opacity:0;
  transform:scale(.8);
  transition:.5s;
}

.card.show{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- luz da pedra -->
<div class="crystal-light"></div>

<div class="container">

  <h1>SOULHASH AI</h1>

  <p id="status">
    Clique para iniciar análise
  </p>

  <button onclick="gerar()">
    INICIAR
  </button>

  <div id="card" class="card"></div>

</div>

<script src="script.js"></script>

</body>
</html>
